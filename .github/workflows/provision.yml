name: Provision Infrastructure

on:
  workflow_dispatch:
    inputs:
      request:
        description: 'Natural language infrastructure request (e.g. "Create a VM for payments service in dev in us-central1")'
        required: true
        default: 'Create a VM in us-east1 zone us-east1-d with machine type e2-small for payments service in dev'
      count:
        description: 'Number of instances to provision in parallel (1–10)'
        required: false
        default: '1'
      environment:
        description: 'Target environment'
        required: false
        default: 'dev'
        type: choice
        options: [dev, stag, prod]

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Setup: Build the dynamic matrix from the count input
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  setup:
    name: Build Instance Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Build matrix from count
        id: build
        run: |
          COUNT=${{ github.event.inputs.count }}
          # Clamp to 1–10 for safety
          if [ "$COUNT" -lt 1 ]; then COUNT=1; fi
          if [ "$COUNT" -gt 10 ]; then COUNT=10; fi
          # Build JSON array: [1, 2, ..., COUNT]
          MATRIX=$(python3 -c "import json; print(json.dumps({'index': list(range(1, int($COUNT)+1))}))")
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Provisioning $COUNT instance(s) in parallel"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Provision: Run N parallel provisioning pipelines
# ─────────────────────────────────────────────────────────────────────────────
  provision:
    name: Provision Instance ${{ matrix.index }} of ${{ github.event.inputs.count }}
    needs: setup
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false   # One failure doesn't cancel the other instances

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up gcloud
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Stagger startup (avoid API rate limits)
        run: |
          DELAY=$(( 15 + (${{ matrix.index }} - 1) * 30 ))
          echo "Instance ${{ matrix.index }}: sleeping ${DELAY}s before starting (MCP warmup + rate limit buffer)..."
          sleep $DELAY

      - name: Run Provisioner (Instance ${{ matrix.index }})
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          INSTANCE_INDEX: ${{ matrix.index }}
          INSTANCE_COUNT: ${{ github.event.inputs.count }}
          GCS_STATE_BUCKET: ${{ secrets.GCS_STATE_BUCKET }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          mkdir -p generated_artifacts/
          python main.py \
            --request "${{ github.event.inputs.request }}" \
            --index ${{ matrix.index }} \
            --count ${{ github.event.inputs.count }}

      - name: Upload Generated Artifacts (Instance ${{ matrix.index }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-artifacts-${{ matrix.index }}
          path: generated_artifacts/
          if-no-files-found: warn
          overwrite: true

      - name: Upload Audit Logs (Instance ${{ matrix.index }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs-instance-${{ matrix.index }}
          path: audit_logs/
          if-no-files-found: warn
          overwrite: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Merge: Collect all per-instance logs into one cumulative artifact
# ─────────────────────────────────────────────────────────────────────────────
  merge-audit-logs:
    name: Merge Audit Logs → Single Artifact
    needs: provision
    runs-on: ubuntu-latest
    if: always()   # Run even if some instances failed

    steps:
      # Find the most recent successful run of this workflow to restore the cumulative 'audit-logs'
      - name: Find Latest Successful Run
        id: last_run
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'provision.yml',
              status: 'success',
              per_page: 1
            });
            if (runs.data.workflow_runs.length > 0) {
              core.setOutput('run_id', runs.data.workflow_runs[0].id);
              console.log(`Found last successful run: ${runs.data.workflow_runs[0].id}`);
            } else {
              console.log('No successful runs found yet.');
            }

      # Restore previous cumulative audit artifact (silent fail on first run)
      - name: Restore Previous Audit Logs
        if: steps.last_run.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: audit-logs
          path: audit_logs/
          run-id: ${{ steps.last_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Download all per-instance audit logs and merge into audit_logs/
      - name: Download All Per-Instance Audit Logs
        uses: actions/download-artifact@v4
        with:
          pattern: audit-logs-instance-*
          path: per_instance_logs/
          merge-multiple: false

      # Merge: each instance wrote to audit_logs/YYYY-MM-DD/*.log
      # Combine them all into a single audit_logs/ tree, appending per-day files
      - name: Merge into cumulative audit_logs/
        run: |
          find per_instance_logs/ -type f -name "*.log" | while read src; do
            # Reconstruct target path: strip leading 'per_instance_logs/<artifact_name>/'
            rel=$(echo "$src" | sed 's|per_instance_logs/[^/]*/||')
            dest="audit_logs/$rel"
            mkdir -p "$(dirname "$dest")"
            cat "$src" >> "$dest"
            echo "  merged: $src → $dest"
          done

      # Upload the single merged artifact (overwrites each run — grows day by day)
      - name: Upload Cumulative Audit Logs
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs
          path: audit_logs/
          if-no-files-found: warn
          overwrite: true

      # Also merge generated artifacts from all instances
      - name: Download All Infrastructure Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: infrastructure-artifacts-*
          path: all_artifacts/
          merge-multiple: true

      - name: Upload Merged Infrastructure Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-artifacts
          path: all_artifacts/
          if-no-files-found: warn
          overwrite: true
