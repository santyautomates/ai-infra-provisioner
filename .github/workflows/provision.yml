name: Provision Infrastructure

on:
  workflow_dispatch:
    inputs:
      request:
        description: 'Natural language infrastructure request'
        required: true
        default: 'Create a VM in us-central1 for order service in dev'

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up gcloud
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Run Provisioner
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          # The provisioner expects to be able to run gcloud commands.
          # The auth step above handles the authentication for gcloud.
        run: |
          python main.py --request "${{ github.event.inputs.request }}"

      - name: Upload Generated Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-artifacts
          path: generated_artifacts/
